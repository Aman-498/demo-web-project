<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f5f5f5;
    }

    /* ===== Navbar ===== */
    nav{
        background:#111;
        color:white;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 40px;
    }

    .logo{
        font-size:24px;
        font-weight:bold;
        color:#ff9800;
    }

    .search input{
        padding:8px 12px;
        width:250px;
        border:none;
        border-radius:5px;
    }

    .cart{
        background:#ff9800;
        padding:8px 15px;
        border-radius:5px;
        font-weight:bold;
        cursor:pointer;
    }

    /* ===== Banner ===== */
    .banner{
        height:280px;
        background:linear-gradient(to right,#ff9800,#ff5722);
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        font-size:32px;
        font-weight:bold;
        margin-bottom:30px;
    }

    /* ===== Products Section ===== */
    .products{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
        gap:20px;
        padding:20px 40px;
    }

    .card{
        background:white;
        border-radius:10px;
        overflow:hidden;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
        transition:0.3s;
        text-align:center;
    }

    .card:hover{
        transform:translateY(-8px);
        box-shadow:0 8px 18px rgba(0,0,0,0.2);
    }

    .card img{
        width:100%;
        height:180px;
        object-fit:cover;
    }

    .card h3{
        margin:12px 0 5px;
    }

    .price{
        color:#ff5722;
        font-weight:bold;
        margin-bottom:10px;
        font-size:18px;
    }

    .btn{
        display:inline-block;
        margin-bottom:15px;
        padding:8px 14px;
        background:#111;
        color:white;
        text-decoration:none;
        border-radius:5px;
        transition:0.3s;
    }

    .btn:hover{
        background:#ff9800;
    }

    /* ===== Footer ===== */
    footer{
        background:#111;
        color:white;
        text-align:center;
        padding:20px;
        margin-top:30px;
    }

    /* ===== Responsive ===== */
    @media(max-width:700px){
        nav{
            flex-direction:column;
            gap:10px;
        }

        .search input{
            width:200px;
        }

        .banner{
            font-size:24px;
            text-align:center;
            padding:20px;
        }
    }

</style>
</head>
<body>

<!-- Navbar -->
<nav>
    <div class="logo">ShopEasy</div>
    <div class="search">
        <input type="text" placeholder="Search products...">
    </div>
    <div class="cart">Cart</div>
</nav>

<!-- Banner -->
<div class="banner">
    Big Sale - Up To 50% OFF
</div>

<!-- Products -->
<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="">
        <h3>Sports Shoes</h3>
        <p class="price">₹1999</p>
        <a href="#" class="btn">Add to Cart</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="">
        <h3>Smart Watch</h3>
        <p class="price">₹2999</p>
        <a href="#" class="btn">Add to Cart</a>
    </div>

    <div class="card">
        <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcROQ-u7DmQrk3scRAqrAwk06qtnASgndPXmo37qcH4woXQ6EJ_ziEwO5-8CCp7LTvyTv09YcRt1GPEL1zh8Usd0WoooDK7Hi8nWR7k1CBX1suevGLc98glgKg" alt="">
        <h3>Headphones</h3>
        <p class="price">₹1499</p>
        <a href="#" class="btn">Add to Cart</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601" alt="">
        <h3>Travel Bag</h3>
        <p class="price">₹999</p>
        <a href="#" class="btn">Add to Cart</a>
    </div>

</section>

<footer>
    © 2026 ShopEasy | HTML + CSS E-Commerce
</footer>

</body>
</html>
